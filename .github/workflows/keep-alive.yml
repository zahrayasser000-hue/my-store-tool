name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://ali-video-empire-xjhprjhpaa2jy7qk7lepl2.streamlit.app/ || true
          echo "App pinged at $(date)"